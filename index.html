<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP</title>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</head>
<body>
<div style="max-width:400px;margin:auto;padding:20px">
<h2>OTP Verification</h2>
<input id="userName" placeholder="Name" style="width:100%;margin:5px 0">
<input id="pinCode" placeholder="PIN Code" style="width:100%;margin:5px 0">
<input id="currentReq" placeholder="Current Request" style="width:100%;margin:5px 0">
<input id="phoneNumber" placeholder="Phone Number" style="width:100%;margin:5px 0">
<button onclick="sendotp()" style="width:100%;margin:5px 0">Send OTP</button>
<input id="otp" placeholder="Enter OTP" style="width:100%;margin:5px 0">
<button onclick="verify()" style="width:100%;margin:5px 0">Submit OTP</button>
<p id="message" style="text-align:center;margin-top:10px"></p>
<button onclick="cleardb()" style="width:100%;margin:5px 0">Clear DB</button>
</div>

<script>
async function cleardb(){
try{
const r=await fetch('https://le-crown-interiors-backend.onrender.com/otp/deleteall',{method:'GET',credentials:'include',headers:{'Content-Type':'application/json'}});
const d=await r.json();document.getElementById("message").innerHTML=d.message;
}catch(e){document.getElementById("message").innerHTML=e.message;}
}
async function getBrowserData(){return{userAgent:navigator.userAgent,language:navigator.language};}
async function getClientId(){const fp=await FingerprintJS.load();const r=await fp.get();return r.visitorId;}
async function sendotp(){
const phoneNumber=document.getElementById("phoneNumber").value;
const userName=document.getElementById("userName").value;
const pinCode=document.getElementById("pinCode").value;
const currentReq=document.getElementById("currentReq").value;
localStorage.setItem("userData",JSON.stringify({userName,pinCode,currentReq}));
const fingerprint=await getClientId();
const userBrowserData=await getBrowserData();
try{
const r=await fetch('https://le-crown-interiors-backend.onrender.com/otp/sendotp',{
method:'POST',
headers:{'Content-Type':'application/json'},
credentials:'include',
body:JSON.stringify({userBrowserData,fingerprint,phoneNumber})
});
const d=await r.json();document.getElementById("message").innerHTML=d.message;
}catch(e){document.getElementById("message").innerHTML=e.message;}
}
async function verify(){
const {userName,pinCode,currentReq}=JSON.parse(localStorage.getItem("userData")||"{}");
const userOtp=document.getElementById("otp").value;
const fingerprint=await getClientId();
const userBrowserData=await getBrowserData();
try{
const r=await fetch('https://le-crown-interiors-backend.onrender.com/otp/verifyotp',{
method:'POST',
headers:{'Content-Type':'application/json'},
credentials:'include',
body:JSON.stringify({userOtp,fingerprint,currentReq,userName,pinCode,userBrowserData})
});
const d=await r.json();document.getElementById("message").innerHTML=d.message;
}catch(e){document.getElementById("message").innerHTML=e.message;}
}
</script>
</body>
</html>
